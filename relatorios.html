<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatórios - Syncrypta</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="protegerPagina(); carregarRelatorio();">

<div class="layout">

  <aside class="sidebar">
    <div>
      <div class="logo">
        <span>S</span>
        <div>
          <h1>Syncrypta</h1>
          <p>Sistema Integrado</p>
        </div>
      </div>

      <div class="menu-lateral">
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="movimentacoes.html">💳 Receitas e Pagamentos</a>
        <a href="importacao.html">📁 Importar CSV</a>
        <a class="ativo" href="relatorios.html">📈 Relatórios</a>
      </div>
    </div>

    <div class="sidebar-baixo">
      <div class="notificacao-box">
        <div class="linha-notificacao" onclick="abrirNotificacoes()">
          <div class="sino">🔔<span id="contadorNotificacoes">0</span></div>
          <div>
            <strong>Notificações</strong>
            <p id="textoNotificacoes">Carregando...</p>
          </div>
        </div>

        <div class="plano-box" onclick="abrirModalPlano()">
          <div class="avatar-plano" id="avatarPlano">TC</div>
          <div>
            <strong id="nomePlanoAtual">Syncrypta Básico</strong>
            <p>Clique para alterar</p>
          </div>
        </div>
      </div>

      <button class="botao-sair" onclick="sair()">Sair</button>
    </div>
  </aside>

  <main class="conteudo">
    <h2>Relatório de Fluxo de Caixa</h2>
    <p class="subtitulo">Resumo financeiro gerado com base nas movimentações cadastradas.</p>

    <section class="painel">
      <div id="relatorioFinal"></div>
      <button onclick="exportarCsv()">Exportar relatório CSV</button>
    </section>
  </main>

</div>

<script src="script.js"></script>
</body>
</html>
