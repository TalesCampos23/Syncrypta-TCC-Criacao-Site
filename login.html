<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Login - Syncrypta</title><link rel="stylesheet" href="style.css"></head>
<body>
<section class="auth-page">
  <div class="auth-card">
    <div class="logo"><span>S</span><div><h1>Syncrypta</h1><p>Acesse sua conta</p></div></div>
    <h2>Login</h2>
    <form id="formLogin">
      <input type="email" id="emailLogin" placeholder="Email">
      <input type="password" id="senhaLogin" placeholder="Senha">
      <button type="submit">Entrar</button>
    </form>
    <p class="auth-link">Não tem conta? <a href="cadastro.html">Cadastrar</a></p>
    <p class="auth-link"><a href="index.html">Voltar ao início</a></p>
  </div>
</section>
<script src="script.js"></script>
</body>
</html>
